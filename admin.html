<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cocoliche — Panel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" />
<style>
  :root{
    --cream:oklch(0.96 0.018 75);
    --wine:oklch(0.32 0.09 15);
    --wine-deep:oklch(0.24 0.075 15);
    --muted:oklch(0.45 0.04 20);
    --border:oklch(0.85 0.025 30 / 0.4);
    --font-display:"Cormorant Garamond","Playfair Display",ui-serif,Georgia,serif;
    --font-sans:"Inter",ui-sans-serif,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--wine-deep);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:inherit;text-decoration:none}

  /* Login */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .login-box{width:100%;max-width:380px}
  .login-box h1{font-family:var(--font-display);font-style:italic;font-size:2.5rem;color:var(--wine);margin-bottom:.25rem}
  .login-box p{font-size:.8rem;color:var(--muted);margin-bottom:2.5rem;letter-spacing:.05em}
  .field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.5rem}
  .field label{font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;color:var(--muted)}
  .field input{background:transparent;border:none;border-bottom:1px solid color-mix(in oklab,var(--wine) 25%,transparent);padding:.6rem 0;font-family:var(--font-sans);font-size:.9rem;color:var(--wine-deep);outline:none;width:100%;transition:border-color .2s}
  .field input:focus{border-bottom-color:var(--wine)}
  .btn{font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;background:var(--wine);color:var(--cream);border:none;padding:.9rem 2rem;cursor:pointer;width:100%;font-family:var(--font-sans);transition:background .2s}
  .btn:hover{background:var(--wine-deep)}
  .login-error{font-size:.8rem;color:#c0392b;margin-top:1rem;display:none}

  /* Dashboard */
  .dashboard{display:none;min-height:100vh}
  .topbar{background:var(--wine);color:var(--cream);padding:0 2rem;height:4rem;display:flex;align-items:center;justify-content:space-between}
  .topbar-brand{font-family:var(--font-display);font-style:italic;font-size:1.4rem}
  .topbar-right{display:flex;align-items:center;gap:1.5rem;font-size:.75rem;letter-spacing:.1em}
  .topbar-right a{opacity:.7;transition:opacity .2s;cursor:pointer}
  .topbar-right a:hover{opacity:1}
  .main{padding:2.5rem 2rem;max-width:1200px;margin:0 auto}

  /* Filters */
  .filters{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2rem;align-items:flex-end}
  .filter-field{display:flex;flex-direction:column;gap:.3rem}
  .filter-field label{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
  .filter-field select,.filter-field input{background:transparent;border:1px solid var(--border);padding:.4rem .75rem;font-family:var(--font-sans);font-size:.8rem;color:var(--wine-deep);outline:none;border-radius:2px}
  .btn-sm{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;background:var(--wine);color:var(--cream);border:none;padding:.45rem 1.25rem;cursor:pointer;font-family:var(--font-sans);border-radius:2px}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2.5rem}
  @media(min-width:768px){.stats{grid-template-columns:repeat(3,1fr)}}
  .stat{border:1px solid var(--border);padding:1.25rem 1.5rem}
  .stat .num{font-family:var(--font-display);font-size:2.5rem;color:var(--wine);line-height:1}
  .stat .lbl{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-top:.25rem}

  /* Table */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.8rem}
  th{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);padding:.75rem 1rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
  td{padding:.75rem 1rem;border-bottom:1px solid color-mix(in oklab,var(--border) 60%,transparent);vertical-align:middle}
  tr:hover td{background:color-mix(in oklab,var(--wine) 3%,transparent)}
  .badge{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;padding:.25rem .6rem;border-radius:999px;font-weight:500}
  .badge.PENDING{background:color-mix(in oklab,orange 15%,transparent);color:darkorange}
  .badge.CONFIRMED{background:color-mix(in oklab,green 12%,transparent);color:darkgreen}
  .badge.CANCELLED{background:color-mix(in oklab,red 12%,transparent);color:#c0392b}
  .action-btn{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;border:1px solid var(--border);padding:.25rem .6rem;cursor:pointer;background:transparent;font-family:var(--font-sans);border-radius:2px;transition:.2s;margin-right:.25rem}
  .action-btn:hover{background:var(--wine);color:var(--cream);border-color:var(--wine)}
  .action-btn.danger:hover{background:#c0392b;border-color:#c0392b}
  .empty{text-align:center;padding:3rem;color:var(--muted);font-size:.85rem;font-style:italic}
  .page-title{font-family:var(--font-display);font-size:2rem;color:var(--wine);margin-bottom:1.75rem}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>Admin</h1>
    <p>Cocoliche — Panel de gestión</p>
    <div class="field">
      <label for="adminKey">Clave de acceso</label>
      <input type="password" id="adminKey" placeholder="••••••••••" />
    </div>
    <button class="btn" id="btnLogin">Ingresar</button>
    <p class="login-error" id="loginError">Clave incorrecta</p>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <span class="topbar-brand">Cocoliche</span>
    <div class="topbar-right">
      <a href="index.html">← Volver al sitio</a>
      <a id="btnLogout">Cerrar sesión</a>
    </div>
  </div>

  <div class="main">
    <h2 class="page-title">Turnos</h2>

    <!-- Stats -->
    <div class="stats">
      <div class="stat"><div class="num" id="statPending">—</div><div class="lbl">Pendientes</div></div>
      <div class="stat"><div class="num" id="statConfirmed">—</div><div class="lbl">Confirmados</div></div>
      <div class="stat"><div class="num" id="statCancelled">—</div><div class="lbl">Cancelados</div></div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-field">
        <label>Estado</label>
        <select id="filterStatus">
          <option value="">Todos</option>
          <option value="PENDING">Pendientes</option>
          <option value="CONFIRMED">Confirmados</option>
          <option value="CANCELLED">Cancelados</option>
        </select>
      </div>
      <div class="filter-field">
        <label>Fecha</label>
        <input type="date" id="filterDate" />
      </div>
      <button class="btn-sm" id="btnFilter">Filtrar</button>
      <button class="btn-sm" style="background:transparent;color:var(--wine);border:1px solid var(--border)" id="btnClear">Limpiar</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Servicio</th>
            <th>Fecha</th>
            <th>Horario</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="appointmentsBody">
          <tr><td colspan="6" class="empty">Cargando turnos…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = 'https://cocoliche1-production.up.railway.app';
let adminKey = '';

// --- Login ---
document.getElementById('btnLogin').addEventListener('click', async () => {
  const key = document.getElementById('adminKey').value.trim();
  if (!key) return;

  // Verificar la clave intentando cargar los turnos
  try {
    const res = await fetch(`${API}/admin/appointments`, {
      headers: { 'x-admin-key': key }
    });
    if (res.status === 401) {
      document.getElementById('loginError').style.display = 'block';
      return;
    }
    adminKey = key;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAppointments();
  } catch {
    document.getElementById('loginError').textContent = 'Error de conexión';
    document.getElementById('loginError').style.display = 'block';
  }
});

document.getElementById('adminKey').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('btnLogin').click();
});

// --- Logout ---
document.getElementById('btnLogout').addEventListener('click', () => {
  adminKey = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminKey').value = '';
});

// --- Cargar turnos ---
async function loadAppointments() {
  const status = document.getElementById('filterStatus').value;
  const date   = document.getElementById('filterDate').value;

  let url = `${API}/admin/appointments?`;
  if (status) url += `status=${status}&`;
  if (date)   url += `date=${date}&`;

  try {
    const res  = await fetch(url, { headers: { 'x-admin-key': adminKey } });
    const json = await res.json();
    renderTable(json.data);
    renderStats(json.data);
  } catch {
    document.getElementById('appointmentsBody').innerHTML =
      '<tr><td colspan="6" class="empty">Error al cargar los turnos</td></tr>';
  }
}

function renderStats(appointments) {
  document.getElementById('statPending').textContent =
    appointments.filter(a => a.status === 'PENDING').length;
  document.getElementById('statConfirmed').textContent =
    appointments.filter(a => a.status === 'CONFIRMED').length;
  document.getElementById('statCancelled').textContent =
    appointments.filter(a => a.status === 'CANCELLED').length;
}

function renderTable(appointments) {
  const tbody = document.getElementById('appointmentsBody');
  if (!appointments.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No hay turnos para mostrar</td></tr>';
    return;
  }

  tbody.innerHTML = appointments.map(a => {
    const date = new Date(a.date).toLocaleDateString('es-AR', { timeZone: 'UTC' });
    const canConfirm  = a.status === 'PENDING';
    const canCancel   = a.status !== 'CANCELLED';

    return `<tr>
      <td>
        <div style="font-weight:500">${a.clientName}</div>
        <div style="font-size:.7rem;color:var(--muted)">${a.clientEmail}</div>
      </td>
      <td>${a.service?.name ?? '—'}</td>
      <td>${date}</td>
      <td>${a.startTime} – ${a.endTime}</td>
      <td><span class="badge ${a.status}">${statusLabel(a.status)}</span></td>
      <td>
        ${canConfirm ? `<button class="action-btn" onclick="changeStatus('${a.id}','CONFIRMED')">Confirmar</button>` : ''}
        ${canCancel  ? `<button class="action-btn danger" onclick="changeStatus('${a.id}','CANCELLED')">Cancelar</button>` : ''}
      </td>
    </tr>`;
  }).join('');
}

function statusLabel(s) {
  return { PENDING: 'Pendiente', CONFIRMED: 'Confirmado', CANCELLED: 'Cancelado' }[s] ?? s;
}

// --- Cambiar estado ---
async function changeStatus(id, status) {
  try {
    await fetch(`${API}/admin/appointments/${id}/status`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
      body:    JSON.stringify({ status }),
    });
    loadAppointments();
  } catch {
    alert('Error al actualizar el turno');
  }
}

// --- Filtros ---
document.getElementById('btnFilter').addEventListener('click', loadAppointments);
document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterDate').value   = '';
  loadAppointments();
});
</script>
</body>
</html>
